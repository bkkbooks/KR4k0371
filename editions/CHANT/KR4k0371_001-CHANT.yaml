body:
  text: 三五歷記未有天地之時混沌狀如雞子盤古生其一中一萬八千歲天地開闢清陽為天濁陰為地盤古在其中一日神於天聖於天天高一丈地厚一丈盤古日長一丈如此一萬八千歲天數極高地極深盤古極長後乃有三皇數起於一立於五甚於七處於九故天去地九萬里瞿曇悉達開元占經卷三歐陽詢藝文類聚卷一太平御覽卷一引首二句輕清者上為天重濁者下為地沖和者為人故天地合精萬物化生太平御覽卷一天地之初有三白烏主生眾烏藝文類聚卷九十二眾陽之精上合為日徑千里周圍三千里下於天七千里太平御覽卷四虞世南北堂書鈔卷一百四十九引日徑以下月徑千里周圍三千里下於地七千里太平御覽卷四星者元氣之精水之英也北堂書鈔卷一百五十太平御覽卷五大星徑百里中星五十里小星三十里北斗七星間相去九千里其二陰星不見者相去八千里皆在日月下太平御覽卷七北斗當崑崙山上氣運注天下春夏為露秋冬為霜太平御覽卷十二又卷十四又卷二十二溟滓始牙濛鴻滋萌歲在攝提元氣始肇有神靈一人十三頭號曰天皇太平御覽卷七十八又卷一引至始肇有神聖人十二頭號地皇太平御覽卷七十八有神聖人九頭號人皇天皇地皇人皇為太古並同上伏羲在神農黃帝之間黃帝時風不鳴條雨不破塊也太平御覽卷三十七
